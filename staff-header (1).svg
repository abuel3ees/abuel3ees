<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%">
  <defs>
    <linearGradient id="staffGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a4a2a;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#5a4a2a;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="staffGradR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a4a2a;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#5a4a2a;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="crystal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4e4f7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8ba4c7;stop-opacity:0"/>
    </radialGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Staff lines (left and right from center) -->
  <line x1="100" y1="40" x2="360" y2="40" stroke="url(#staffGradL)" stroke-width="2" stroke-linecap="round"/>
  <line x1="440" y1="40" x2="700" y2="40" stroke="url(#staffGradR)" stroke-width="2" stroke-linecap="round"/>

  <!-- Knot details on staff -->
  <circle cx="200" cy="40" r="2" fill="none" stroke="#5a4a2a" stroke-width="0.5" opacity="0.2"/>
  <circle cx="600" cy="40" r="2" fill="none" stroke="#5a4a2a" stroke-width="0.5" opacity="0.2"/>

  <!-- Crystal at the top of the staff -->
  <g transform="translate(400, 40)" filter="url(#sGlow)">
    <!-- Crystal shape (pointed gem) -->
    <polygon points="0,-18 10,-4 6,8 -6,8 -10,-4" fill="none" stroke="#8ba4c7" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <!-- Inner glow -->
    <circle r="6" fill="url(#crystal)" opacity="0.5">
      <animate attributeName="r" values="5;8;5" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Core spark -->
    <circle r="2" fill="#d4e4f7" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title text -->
  <text x="400" y="72" text-anchor="middle" fill="#8b7340" font-size="10" font-family="'Palatino Linotype', Palatino, Georgia, serif" letter-spacing="6" font-variant="small-caps" opacity="0.5">
    The Great Works of the Age
  </text>
</svg>
