<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mithrandir of the Machine banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1026"/>
      <stop offset="0.55" stop-color="#1D2A66"/>
      <stop offset="1" stop-color="#6E2DA8"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 86) rotate(121.882) scale(170 180)">
      <stop stop-color="#B6F0FF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#B6F0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="155" y1="214" x2="1010" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#63D8FF"/>
      <stop offset="1" stop-color="#A88BFF"/>
    </linearGradient>
    <filter id="soft" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="26" fill="url(#bg)"/>
  <circle cx="980" cy="86" r="170" fill="url(#orb)"/>

  <g opacity="0.7">
    <circle cx="120" cy="78" r="2" fill="#F5FAFF"/>
    <circle cx="174" cy="54" r="2" fill="#F5FAFF"/>
    <circle cx="236" cy="86" r="2" fill="#F5FAFF"/>
    <circle cx="308" cy="64" r="2" fill="#F5FAFF"/>
    <circle cx="1028" cy="208" r="2" fill="#F5FAFF"/>
    <circle cx="1062" cy="180" r="2" fill="#F5FAFF"/>
    <circle cx="1120" cy="212" r="2" fill="#F5FAFF"/>
  </g>

  <g filter="url(#soft)" opacity="0.25">
    <path d="M142 228H1040" stroke="#8FE9FF" stroke-width="8" stroke-linecap="round"/>
  </g>
  <path d="M160 214H1020" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>

  <text x="72" y="118" fill="#ECF6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="45" font-weight="800" letter-spacing="0.5">
    🧙 Mithrandir of the Machine
  </text>
  <text x="72" y="162" fill="#C6DBFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="25" font-weight="600">
    abuel3ees • forging software artefacts of logic and light
  </text>
  <text x="72" y="254" fill="#DFF4FF" font-family="Consolas, Menlo, monospace" font-size="20">
    ONE CODEBASE TO RULE THEM ALL
  </text>
</svg>
