<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="40%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7AA2F7"/>
      <stop offset="50%" style="stop-color:#BB9AF7"/>
      <stop offset="100%" style="stop-color:#7DCFFF"/>
    </linearGradient>
    <linearGradient id="runeGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7AA2F7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7AA2F7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="lavaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star clip -->
    <radialGradient id="starGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Stars background -->
  <g opacity="0.6">
    <circle cx="50" cy="30" r="1.2" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="80" r="0.8" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="45" r="1" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="25" r="1.5" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="60" r="0.7" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="35" r="1.3" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="70" r="0.9" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="20" r="1.1" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="55" r="1.4" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="40" r="0.8" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="120" r="0.6" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="100" r="1" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="110" r="0.8" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="95" r="1.2" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="105" r="0.7" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="150" r="1" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="140" r="0.9" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="130" r="1.1" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="145" r="0.6" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="75" cy="180" r="0.8" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Mountains silhouette -->
  <polygon points="0,320 80,220 160,280 250,190 340,260 420,200 500,240 560,180 640,250 720,210 800,260 880,190 960,240 1040,220 1120,260 1200,200 1200,400 0,400" fill="url(#mountainGrad)" opacity="0.5"/>
  <polygon points="0,340 100,260 200,300 300,240 400,290 500,250 580,220 660,270 740,240 830,280 920,230 1000,270 1080,250 1200,280 1200,400 0,400" fill="#0f172a" opacity="0.7"/>

  <!-- Volcano glow -->
  <ellipse cx="560" cy="180" rx="30" ry="5" fill="#f97316" opacity="0.3" filter="url(#bigGlow)">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating rune particles -->
  <g filter="url(#glow)">
    <text x="120" y="200" fill="#7AA2F7" font-size="14" opacity="0.4" font-family="serif">ᚦ<animate attributeName="y" values="200;180;200" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/></text>
    <text x="300" y="170" fill="#BB9AF7" font-size="16" opacity="0.3" font-family="serif">ᚨ<animate attributeName="y" values="170;150;170" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/></text>
    <text x="480" y="160" fill="#7DCFFF" font-size="12" opacity="0.3" font-family="serif">ᚱ<animate attributeName="y" values="160;140;160" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.5;0.2" dur="7s" repeatCount="indefinite"/></text>
    <text x="700" y="180" fill="#7AA2F7" font-size="15" opacity="0.4" font-family="serif">ᛗ<animate attributeName="y" values="180;155;180" dur="5.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.5s" repeatCount="indefinite"/></text>
    <text x="900" y="165" fill="#BB9AF7" font-size="13" opacity="0.3" font-family="serif">ᛟ<animate attributeName="y" values="165;145;165" dur="6.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.1;0.5;0.1" dur="6.5s" repeatCount="indefinite"/></text>
    <text x="1050" y="190" fill="#7DCFFF" font-size="14" opacity="0.4" font-family="serif">ᚠ<animate attributeName="y" values="190;170;190" dur="5.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.8s" repeatCount="indefinite"/></text>
  </g>

  <!-- Wizard hat icon -->
  <g transform="translate(600, 75)" filter="url(#bigGlow)">
    <polygon points="0,-45 -25,15 25,15" fill="none" stroke="#7AA2F7" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <line x1="0" y1="-45" x2="0" y2="-55" stroke="#BB9AF7" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="-58" r="3" fill="#BB9AF7" opacity="0.7">
      <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main Title -->
  <text x="600" y="160" text-anchor="middle" fill="url(#titleGrad)" font-size="48" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" letter-spacing="3" filter="url(#subtleGlow)">
    Mithrandir of the Machine
  </text>

  <!-- Decorative line -->
  <line x1="320" y1="180" x2="880" y2="180" stroke="url(#titleGrad)" stroke-width="0.5" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="600" y="210" text-anchor="middle" fill="#a9b1d6" font-size="16" font-family="Georgia, serif" font-style="italic" opacity="0.8">
    A wanderer of the digital realm, forging artefacts of logic and light
  </text>

  <!-- Animated orbiting dots -->
  <g filter="url(#glow)">
    <circle r="2" fill="#7AA2F7">
      <animateMotion dur="12s" repeatCount="indefinite" path="M600,250 C700,230 750,270 700,290 C650,310 550,310 500,290 C450,270 500,230 600,250"/>
    </circle>
    <circle r="1.5" fill="#BB9AF7">
      <animateMotion dur="12s" repeatCount="indefinite" begin="-4s" path="M600,250 C700,230 750,270 700,290 C650,310 550,310 500,290 C450,270 500,230 600,250"/>
    </circle>
    <circle r="1.8" fill="#7DCFFF">
      <animateMotion dur="12s" repeatCount="indefinite" begin="-8s" path="M600,250 C700,230 750,270 700,290 C650,310 550,310 500,290 C450,270 500,230 600,250"/>
    </circle>
  </g>

  <!-- Ring of Power (One Ring) -->
  <g transform="translate(600, 270)">
    <ellipse cx="0" cy="0" rx="60" ry="18" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" filter="url(#glow)">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Tengwar-style inscription on ring -->
    <text x="0" y="5" text-anchor="middle" fill="#f59e0b" font-size="8" font-family="serif" opacity="0.3" letter-spacing="4">
      ✦ one repo to rule them all ✦
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Bottom stats bar -->
  <rect x="0" y="360" width="1200" height="40" fill="#0a0e1a" opacity="0.6"/>
  <g fill="#565f89" font-size="12" font-family="monospace">
    <text x="200" y="385" text-anchor="middle">⚔️ Full-Stack</text>
    <text x="400" y="385" text-anchor="middle">🔮 Hardware Design</text>
    <text x="600" y="385" text-anchor="middle">🧙 Open Source</text>
    <text x="800" y="385" text-anchor="middle">📜 RISC-V</text>
    <text x="1000" y="385" text-anchor="middle">🌋 GPU Sorcery</text>
  </g>
</svg>
