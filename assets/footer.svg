<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="100%">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="ftg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7AA2F7"/>
      <stop offset="50%" style="stop-color:#BB9AF7"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="150" fill="url(#fbg)" rx="8"/>

  <!-- Stars -->
  <g opacity="0.3">
    <circle cx="100" cy="20" r="0.8" fill="white"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="35" r="0.6" fill="white"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="15" r="0.9" fill="white"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="30" r="0.7" fill="white"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="22" r="0.8" fill="white"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Decorative top line -->
  <line x1="150" y1="20" x2="650" y2="20" stroke="url(#ftg)" stroke-width="0.5" opacity="0.3"/>

  <!-- Quote -->
  <text x="400" y="55" text-anchor="middle" fill="#a9b1d6" font-size="14" font-family="Georgia, serif" font-style="italic" opacity="0.8">
    "All we have to decide is what to do with the time that is given us."
  </text>

  <!-- Volcano emoji line -->
  <text x="400" y="90" text-anchor="middle" fill="#c0caf5" font-size="13" font-family="monospace">
    🌋 May your builds never fail and your PRs always be merged 🌋
  </text>

  <!-- Animated bottom sparkle -->
  <g filter="url(#fg)">
    <circle cx="300" cy="120" r="2" fill="#7AA2F7" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;3;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="118" r="2" fill="#BB9AF7" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="120" r="2" fill="#f59e0b" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;3;1" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom line -->
  <line x1="200" y1="135" x2="600" y2="135" stroke="url(#ftg)" stroke-width="0.3" opacity="0.2"/>
</svg>
