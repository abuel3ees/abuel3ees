<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%">
  <defs>
    <!-- Aged parchment -->
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1712"/>
      <stop offset="30%" style="stop-color:#1e1b15"/>
      <stop offset="70%" style="stop-color:#1c1914"/>
      <stop offset="100%" style="stop-color:#171410"/>
    </linearGradient>
    <!-- Ink colors -->
    <linearGradient id="inkGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b7340"/>
      <stop offset="50%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#8b7340"/>
    </linearGradient>
    <filter id="mapGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mapDeepGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Border pattern -->
    <pattern id="borderPattern" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="none"/>
      <circle cx="20" cy="20" r="1" fill="#5a4a2a" opacity="0.2"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="#5a4a2a" stroke-width="0.2" opacity="0.1"/>
      <line x1="20" y1="0" x2="20" y2="40" stroke="#5a4a2a" stroke-width="0.2" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#parchment)" rx="4"/>
  <rect x="5" y="5" width="990" height="590" fill="none" stroke="#5a4a2a" stroke-width="0.5" opacity="0.3" rx="3"/>
  <rect x="15" y="15" width="970" height="570" fill="none" stroke="#5a4a2a" stroke-width="0.3" opacity="0.2" rx="2"/>
  <rect width="1000" height="600" fill="url(#borderPattern)" opacity="0.3"/>

  <!-- Map title (scroll style) -->
  <text x="500" y="55" text-anchor="middle" fill="#8b7340" font-size="18" font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif" letter-spacing="6" font-variant="small-caps" opacity="0.7">
    The Realms of the Armoury
  </text>
  <line x1="250" y1="65" x2="750" y2="65" stroke="#5a4a2a" stroke-width="0.5" opacity="0.3"/>
  <text x="500" y="80" text-anchor="middle" fill="#6b5d3a" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" letter-spacing="3" opacity="0.5">
    A Chronicle of Languages, Frameworks &amp; Dominions
  </text>

  <!-- === ROADS / PATHS between locations === -->
  <g stroke="#5a4a2a" stroke-width="0.8" fill="none" opacity="0.2" stroke-dasharray="4,4">
    <!-- Shire (TS) to Rivendell (React) -->
    <path d="M180,180 C250,170 300,200 370,220"/>
    <!-- Rivendell (React) to Moria (Node) -->
    <path d="M420,220 C480,250 500,280 530,320"/>
    <!-- Moria (Node) to Gondor (Laravel) -->
    <path d="M570,340 C620,360 680,370 730,350"/>
    <!-- Shire (TS) to Bree (JS) -->
    <path d="M200,200 C220,240 230,280 250,310"/>
    <!-- Rohan (PHP) to Gondor (Laravel) -->
    <path d="M450,430 C530,420 620,390 700,360"/>
    <!-- Mordor (Verilog) to Barad-dûr (CUDA) -->
    <path d="M850,210 C870,260 880,310 870,370"/>
    <!-- Isengard (Java) connections -->
    <path d="M170,440 C250,430 330,420 420,430"/>
    <!-- Rivendell to Lothlórien (Python) -->
    <path d="M400,240 C400,300 350,350 310,400"/>
  </g>

  <!-- Animated traveling dots (fellowship on the road) -->
  <circle r="2.5" fill="#c9a84c" opacity="0.5" filter="url(#mapGlow)">
    <animateMotion dur="10s" repeatCount="indefinite" path="M180,180 C250,170 300,200 370,220 C480,250 500,280 530,320 C620,360 680,370 730,350"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#8ba4c7" opacity="0.4" filter="url(#mapGlow)">
    <animateMotion dur="12s" repeatCount="indefinite" path="M200,200 C220,240 230,280 250,310 C300,350 350,380 310,400 C280,420 220,440 170,440"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- ============================================ -->
  <!-- LOCATION MARKERS — Each skill as a place     -->
  <!-- ============================================ -->

  <!-- === THE SHIRE — TypeScript (Home, Primary) === -->
  <g transform="translate(170, 170)">
    <circle r="24" fill="#1e1b15" stroke="#3178C6" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <circle r="20" fill="none" stroke="#3178C6" stroke-width="0.3" opacity="0.3">
      <animate attributeName="r" values="20;26;20" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="2" text-anchor="middle" fill="#3178C6" font-size="10" font-family="monospace" font-weight="bold" dominant-baseline="middle">TS</text>
    <text x="0" y="40" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">The Shire</text>
    <text x="0" y="52" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">TypeScript</text>
    <!-- Little hobbit hole door -->
    <circle cx="0" cy="-1" r="8" fill="none" stroke="#3178C6" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- === BREE — JavaScript === -->
  <g transform="translate(250, 310)">
    <circle r="20" fill="#1e1b15" stroke="#F7DF1E" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <text x="0" y="2" text-anchor="middle" fill="#F7DF1E" font-size="10" font-family="monospace" font-weight="bold" dominant-baseline="middle">JS</text>
    <text x="0" y="35" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Bree</text>
    <text x="0" y="47" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">JavaScript</text>
  </g>

  <!-- === RIVENDELL — React === -->
  <g transform="translate(390, 210)">
    <circle r="26" fill="#1e1b15" stroke="#61DAFB" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <!-- Elrond's ring-like orbit -->
    <ellipse rx="30" ry="10" fill="none" stroke="#61DAFB" stroke-width="0.4" opacity="0.25">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </ellipse>
    <text x="0" y="2" text-anchor="middle" fill="#61DAFB" font-size="9" font-family="monospace" font-weight="bold" dominant-baseline="middle">React</text>
    <text x="0" y="42" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Rivendell</text>
    <text x="0" y="54" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">The Last Homely House</text>
    <!-- Waterfall lines -->
    <line x1="-15" y1="-30" x2="-15" y2="-20" stroke="#61DAFB" stroke-width="0.3" opacity="0.2"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite"/></line>
    <line x1="15" y1="-30" x2="15" y2="-20" stroke="#61DAFB" stroke-width="0.3" opacity="0.2"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="2.5s" repeatCount="indefinite"/></line>
  </g>

  <!-- === MORIA — Node.js === -->
  <g transform="translate(540, 330)">
    <circle r="22" fill="#1e1b15" stroke="#339933" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <text x="0" y="2" text-anchor="middle" fill="#339933" font-size="9" font-family="monospace" font-weight="bold" dominant-baseline="middle">Node</text>
    <text x="0" y="38" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Moria</text>
    <text x="0" y="50" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">The Deep Server</text>
    <!-- Mine shaft lines -->
    <line x1="-8" y1="15" x2="-8" y2="22" stroke="#339933" stroke-width="0.3" opacity="0.15"/>
    <line x1="0" y1="15" x2="0" y2="22" stroke="#339933" stroke-width="0.3" opacity="0.15"/>
    <line x1="8" y1="15" x2="8" y2="22" stroke="#339933" stroke-width="0.3" opacity="0.15"/>
  </g>

  <!-- === GONDOR — Laravel === -->
  <g transform="translate(740, 340)">
    <circle r="24" fill="#1e1b15" stroke="#FF2D20" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <text x="0" y="2" text-anchor="middle" fill="#FF2D20" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">Laravel</text>
    <text x="0" y="40" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Gondor</text>
    <text x="0" y="52" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">The White City</text>
    <!-- Tower of Ecthelion hint -->
    <line x1="0" y1="-28" x2="0" y2="-35" stroke="#FF2D20" stroke-width="0.5" opacity="0.3"/>
    <circle cx="0" cy="-37" r="1.5" fill="#FF2D20" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- === ROHAN — PHP === -->
  <g transform="translate(440, 430)">
    <circle r="20" fill="#1e1b15" stroke="#777BB4" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <text x="0" y="2" text-anchor="middle" fill="#777BB4" font-size="10" font-family="monospace" font-weight="bold" dominant-baseline="middle">PHP</text>
    <text x="0" y="35" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Rohan</text>
    <text x="0" y="47" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">The Riddermark</text>
  </g>

  <!-- === ISENGARD — Java === -->
  <g transform="translate(160, 440)">
    <circle r="20" fill="#1e1b15" stroke="#ED8B00" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <text x="0" y="2" text-anchor="middle" fill="#ED8B00" font-size="10" font-family="monospace" font-weight="bold" dominant-baseline="middle">Java</text>
    <text x="0" y="35" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Isengard</text>
    <text x="0" y="47" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">Tower of Orthanc</text>
  </g>

  <!-- === LOTHLÓRIEN — Python === -->
  <g transform="translate(310, 410)">
    <circle r="22" fill="#1e1b15" stroke="#3776AB" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <!-- Golden leaves -->
    <circle r="26" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.15">
      <animate attributeName="r" values="26;30;26" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="2" text-anchor="middle" fill="#3776AB" font-size="10" font-family="monospace" font-weight="bold" dominant-baseline="middle">Py</text>
    <text x="0" y="38" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Lothlórien</text>
    <text x="0" y="50" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">The Golden Wood</text>
  </g>

  <!-- === MORDOR — Verilog (The Dark Land of Hardware) === -->
  <g transform="translate(850, 190)">
    <circle r="26" fill="#1e1b15" stroke="#EE3333" stroke-width="2" opacity="0.8" filter="url(#mapGlow)"/>
    <!-- The Eye glow -->
    <circle r="30" fill="none" stroke="#EE3333" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="28;35;28" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="0" text-anchor="middle" fill="#EE3333" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">HDL</text>
    <text x="0" y="42" text-anchor="middle" fill="#8b2500" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.7">Mordor</text>
    <text x="0" y="54" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">Verilog · The Dark Forge</text>
    <!-- Mount Doom hint -->
    <polygon points="0,-32 -8,-22 8,-22" fill="none" stroke="#8b2500" stroke-width="0.5" opacity="0.3"/>
    <circle cx="0" cy="-34" r="2" fill="#c44100" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- === BARAD-DÛR — CUDA === -->
  <g transform="translate(860, 390)">
    <circle r="22" fill="#1e1b15" stroke="#76B900" stroke-width="1.5" opacity="0.8" filter="url(#mapGlow)"/>
    <text x="0" y="2" text-anchor="middle" fill="#76B900" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">CUDA</text>
    <text x="0" y="38" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Barad-dûr</text>
    <text x="0" y="50" text-anchor="middle" fill="#6b5d3a" font-size="7" font-family="monospace" opacity="0.4">GPU Sorcery</text>
    <!-- Lightning bolt -->
    <line x1="0" y1="-25" x2="3" y2="-30" stroke="#76B900" stroke-width="0.5" opacity="0.3">
      <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- === GIT — The Seeing Stones network === -->
  <g transform="translate(640, 480)">
    <circle r="18" fill="#1e1b15" stroke="#F05032" stroke-width="1.5" opacity="0.8"/>
    <text x="0" y="2" text-anchor="middle" fill="#F05032" font-size="10" font-family="monospace" font-weight="bold" dominant-baseline="middle">Git</text>
    <text x="0" y="32" text-anchor="middle" fill="#8b7340" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.6">Palantíri</text>
  </g>

  <!-- Map legend / compass rose -->
  <g transform="translate(920, 530)" opacity="0.4">
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#5a4a2a" stroke-width="0.5"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#5a4a2a" stroke-width="0.5"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#5a4a2a" stroke-width="0.3"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#5a4a2a" stroke-width="0.3"/>
    <text x="0" y="-20" text-anchor="middle" fill="#5a4a2a" font-size="7" font-family="serif">N</text>
    <circle r="18" fill="none" stroke="#5a4a2a" stroke-width="0.3"/>
  </g>

  <!-- Map attribution -->
  <text x="500" y="580" text-anchor="middle" fill="#5a4a2a" font-size="8" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" opacity="0.35" letter-spacing="2">
    — Here be the dominions of abuel3ees, Keeper of Code —
  </text>
</svg>
