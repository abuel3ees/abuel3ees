<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="g2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g3">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bg2)"/>

  <!-- Subtle star field -->
  <g opacity="0.4">
    <circle cx="45" cy="30" r="0.8" fill="white"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="70" r="0.6" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="20" r="0.9" fill="white"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="45" r="0.7" fill="white"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="65" r="0.8" fill="white"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="890" cy="35" r="0.6" fill="white"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="90" r="0.7" fill="white"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Connection lines (constellation style) -->
  <g stroke="#7AA2F7" stroke-width="0.5" opacity="0.15">
    <!-- Languages cluster connections -->
    <line x1="150" y1="120" x2="260" y2="180"/>
    <line x1="260" y1="180" x2="150" y2="240"/>
    <line x1="150" y1="240" x2="260" y2="300"/>
    <line x1="260" y1="300" x2="150" y2="360"/>
    <line x1="150" y1="120" x2="150" y2="240"/>
    <line x1="260" y1="180" x2="260" y2="300"/>
    <!-- Cross connections -->
    <line x1="260" y1="180" x2="500" y2="250"/>
    <line x1="260" y1="300" x2="500" y2="250"/>
    <line x1="500" y1="250" x2="700" y2="140"/>
    <line x1="500" y1="250" x2="700" y2="220"/>
    <line x1="500" y1="250" x2="700" y2="300"/>
    <line x1="500" y1="250" x2="700" y2="380"/>
    <line x1="700" y1="140" x2="850" y2="180"/>
    <line x1="700" y1="220" x2="850" y2="260"/>
    <line x1="700" y1="300" x2="850" y2="260"/>
    <line x1="700" y1="380" x2="850" y2="340"/>
    <line x1="850" y1="180" x2="850" y2="260"/>
    <line x1="850" y1="260" x2="850" y2="340"/>
  </g>

  <!-- Animated pulse along connections -->
  <circle r="2" fill="#7AA2F7" opacity="0.6" filter="url(#g2)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M260,180 L500,250 L700,220 L850,260"/>
  </circle>
  <circle r="2" fill="#BB9AF7" opacity="0.6" filter="url(#g2)">
    <animateMotion dur="5s" repeatCount="indefinite" path="M150,240 L260,300 L500,250 L700,300 L850,340"/>
  </circle>
  <circle r="1.5" fill="#7DCFFF" opacity="0.6" filter="url(#g2)">
    <animateMotion dur="4.5s" repeatCount="indefinite" path="M150,120 L260,180 L500,250 L700,140 L850,180"/>
  </circle>

  <!-- Central nexus -->
  <g transform="translate(500, 250)">
    <circle r="30" fill="#1a1b26" stroke="#7AA2F7" stroke-width="1" opacity="0.8"/>
    <circle r="25" fill="none" stroke="#BB9AF7" stroke-width="0.5" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle r="20" fill="none" stroke="#7DCFFF" stroke-width="0.5" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="2" text-anchor="middle" fill="#c0caf5" font-size="9" font-family="monospace" dominant-baseline="middle">CORE</text>
    <circle r="32" fill="none" stroke="#7AA2F7" stroke-width="0.3" opacity="0.2" filter="url(#g3)">
      <animate attributeName="r" values="30;38;30" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- LANGUAGES (Left cluster) -->
  <!-- TypeScript -->
  <g transform="translate(150, 120)">
    <circle r="20" fill="#1a1b26" stroke="#3178C6" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#3178C6" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">TS</text>
    <circle r="22" fill="none" stroke="#3178C6" stroke-width="0.3" opacity="0"><animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/><animate attributeName="r" values="22;28;22" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- JavaScript -->
  <g transform="translate(260, 180)">
    <circle r="18" fill="#1a1b26" stroke="#F7DF1E" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#F7DF1E" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">JS</text>
    <circle r="20" fill="none" stroke="#F7DF1E" stroke-width="0.3" opacity="0"><animate attributeName="opacity" values="0;0.5;0" dur="3.5s" repeatCount="indefinite"/><animate attributeName="r" values="20;26;20" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- PHP -->
  <g transform="translate(150, 240)">
    <circle r="17" fill="#1a1b26" stroke="#777BB4" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#777BB4" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">PHP</text>
  </g>

  <!-- Java -->
  <g transform="translate(260, 300)">
    <circle r="17" fill="#1a1b26" stroke="#ED8B00" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#ED8B00" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">Java</text>
  </g>

  <!-- Python -->
  <g transform="translate(150, 360)">
    <circle r="18" fill="#1a1b26" stroke="#3776AB" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#3776AB" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">Py</text>
    <circle r="20" fill="none" stroke="#3776AB" stroke-width="0.3" opacity="0"><animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"/><animate attributeName="r" values="20;26;20" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Verilog -->
  <g transform="translate(80, 300)">
    <circle r="16" fill="#1a1b26" stroke="#EE3333" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#EE3333" font-size="7" font-family="monospace" font-weight="bold" dominant-baseline="middle">HDL</text>
  </g>

  <!-- CUDA -->
  <g transform="translate(80" cy="180">
    <circle cx="80" cy="180" r="16" fill="#1a1b26" stroke="#76B900" stroke-width="1.5" filter="url(#g2)"/>
    <text x="80" y="181" text-anchor="middle" fill="#76B900" font-size="7" font-family="monospace" font-weight="bold" dominant-baseline="middle">CUDA</text>
  </g>

  <!-- Extra connection lines for new nodes -->
  <g stroke="#7AA2F7" stroke-width="0.5" opacity="0.12">
    <line x1="80" y1="300" x2="150" y2="240"/>
    <line x1="80" y1="300" x2="150" y2="360"/>
    <line x1="80" y1="180" x2="150" y2="120"/>
    <line x1="80" y1="180" x2="150" y2="240"/>
  </g>

  <!-- FRAMEWORKS (Right cluster) -->
  <!-- React -->
  <g transform="translate(700, 140)">
    <circle r="22" fill="#1a1b26" stroke="#61DAFB" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#61DAFB" font-size="7" font-family="monospace" font-weight="bold" dominant-baseline="middle">React</text>
    <!-- Electron orbit -->
    <ellipse rx="28" ry="10" fill="none" stroke="#61DAFB" stroke-width="0.5" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Laravel -->
  <g transform="translate(700, 220)">
    <circle r="20" fill="#1a1b26" stroke="#FF2D20" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#FF2D20" font-size="6" font-family="monospace" font-weight="bold" dominant-baseline="middle">Laravel</text>
  </g>

  <!-- Node.js -->
  <g transform="translate(700, 300)">
    <circle r="19" fill="#1a1b26" stroke="#339933" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#339933" font-size="7" font-family="monospace" font-weight="bold" dominant-baseline="middle">Node</text>
  </g>

  <!-- Git -->
  <g transform="translate(700, 380)">
    <circle r="17" fill="#1a1b26" stroke="#F05032" stroke-width="1.5" filter="url(#g2)"/>
    <text x="0" y="1" text-anchor="middle" fill="#F05032" font-size="8" font-family="monospace" font-weight="bold" dominant-baseline="middle">Git</text>
  </g>

  <!-- Domains (Far right) -->
  <g transform="translate(850, 180)">
    <circle r="14" fill="#1a1b26" stroke="#7AA2F7" stroke-width="1" opacity="0.7"/>
    <text x="0" y="1" text-anchor="middle" fill="#7AA2F7" font-size="6" font-family="monospace" dominant-baseline="middle">Web</text>
  </g>
  <g transform="translate(850, 260)">
    <circle r="14" fill="#1a1b26" stroke="#BB9AF7" stroke-width="1" opacity="0.7"/>
    <text x="0" y="1" text-anchor="middle" fill="#BB9AF7" font-size="6" font-family="monospace" dominant-baseline="middle">Sys</text>
  </g>
  <g transform="translate(850, 340)">
    <circle r="14" fill="#1a1b26" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <text x="0" y="1" text-anchor="middle" fill="#f59e0b" font-size="5" font-family="monospace" dominant-baseline="middle">HW</text>
  </g>

  <!-- Section Labels -->
  <text x="150" y="80" text-anchor="middle" fill="#565f89" font-size="11" font-family="monospace" letter-spacing="3">LANGUAGES</text>
  <text x="500" y="195" text-anchor="middle" fill="#565f89" font-size="10" font-family="monospace" letter-spacing="2">NEXUS</text>
  <text x="700" y="95" text-anchor="middle" fill="#565f89" font-size="11" font-family="monospace" letter-spacing="3">FRAMEWORKS</text>
  <text x="850" y="140" text-anchor="middle" fill="#565f89" font-size="10" font-family="monospace" letter-spacing="2">DOMAINS</text>

  <!-- Bottom decorative line -->
  <line x1="100" y1="460" x2="900" y2="460" stroke="#7AA2F7" stroke-width="0.3" opacity="0.2"/>
  <text x="500" y="480" text-anchor="middle" fill="#565f89" font-size="9" font-family="monospace" font-style="italic" opacity="0.5">The Fellowship's Arsenal — Connected by Purpose</text>
</svg>
