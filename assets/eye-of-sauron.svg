<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%">
  <defs>
    <linearGradient id="eyeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#12151c"/>
    </linearGradient>
    <radialGradient id="eyeFire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6a00;stop-opacity:0.15"/>
      <stop offset="40%" style="stop-color:#c44100;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#8b2500;stop-opacity:0"/>
    </radialGradient>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeSoftGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="250" fill="url(#eyeBg)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#6b5d3a" font-size="11" font-family="'Palatino Linotype', Palatino, Georgia, serif" letter-spacing="6" font-variant="small-caps" opacity="0.5">
    The Palantír Reveals...
  </text>

  <!-- === THE EYE === -->
  <g transform="translate(400, 130)">
    <!-- Outer fire ring -->
    <ellipse rx="140" ry="55" fill="none" stroke="#8b2500" stroke-width="1.5" opacity="0.2" filter="url(#eyeGlow)">
      <animate attributeName="ry" values="50;58;50" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Mid fire ring -->
    <ellipse rx="110" ry="42" fill="none" stroke="#c44100" stroke-width="1" opacity="0.25" filter="url(#eyeSoftGlow)">
      <animate attributeName="ry" values="40;46;40" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.35;0.2" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Inner eye shape -->
    <ellipse rx="80" ry="32" fill="url(#eyeFire)" stroke="#ff6a00" stroke-width="0.8" opacity="0.3">
      <animate attributeName="ry" values="30;35;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.4;0.25" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Pupil (the slit) -->
    <ellipse rx="4" ry="28" fill="#ff6a00" opacity="0.3" filter="url(#eyeGlow)">
      <animate attributeName="ry" values="25;30;25" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="rx" values="3;5;3" dur="5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Core bright point -->
    <circle r="3" fill="#ffaa00" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Fire wisps rising -->
    <line x1="-60" y1="-20" x2="-70" y2="-45" stroke="#c44100" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="55" y1="-25" x2="65" y2="-50" stroke="#c44100" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.25;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="0" y1="-35" x2="5" y2="-55" stroke="#ff6a00" stroke-width="0.3" opacity="0">
      <animate attributeName="opacity" values="0;0.2;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="-30" y1="-30" x2="-40" y2="-50" stroke="#8b2500" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.2;0" dur="4s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="30" y1="-30" x2="40" y2="-48" stroke="#8b2500" stroke-width="0.4" opacity="0">
      <animate attributeName="opacity" values="0;0.15;0" dur="3.8s" repeatCount="indefinite" begin="0.8s"/>
    </line>
  </g>

  <!-- Bottom text -->
  <text x="400" y="230" text-anchor="middle" fill="#6b5d3a" font-size="9" font-family="'Palatino Linotype', Georgia, serif" font-style="italic" letter-spacing="3" opacity="0.4">
    Gaze into the seeing-stone and behold the chronicle of deeds
  </text>
</svg>
