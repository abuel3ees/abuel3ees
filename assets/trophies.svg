<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-labelledby="title desc">
  <title id="title">Trophies of the Age</title>
  <desc id="desc">Decorative trophies banner used as a local fallback for profile trophies.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d0f14"/>
      <stop offset="100%" stop-color="#121722"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8d46d"/>
      <stop offset="100%" stop-color="#c9952c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="240" fill="url(#bg)" rx="16"/>
  <text x="600" y="76" text-anchor="middle" fill="#d4e4f7" font-size="36" font-family="Cinzel, Georgia, serif">
    Trophies of the Age
  </text>
  <text x="600" y="118" text-anchor="middle" fill="#8ba4c7" font-size="18" font-family="Georgia, serif">
    Keep coding to forge new legends.
  </text>

  <g fill="url(#gold)" font-size="48" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, sans-serif">
    <text x="220" y="184">🏆</text>
    <text x="346" y="184">🥇</text>
    <text x="472" y="184">⚔️</text>
    <text x="600" y="184">👑</text>
    <text x="728" y="184">🛡️</text>
    <text x="854" y="184">🥈</text>
    <text x="980" y="184">🏆</text>
  </g>
</svg>
