<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="100%">
  <defs>
    <linearGradient id="phg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7AA2F7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7AA2F7;stop-opacity:0"/>
    </linearGradient>
    <filter id="pg">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sword decoration left -->
  <line x1="100" y1="30" x2="300" y2="30" stroke="url(#phg)" stroke-width="0.8" opacity="0.5"/>
  <polygon points="95,30 105,26 105,34" fill="#f59e0b" opacity="0.4"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#c0caf5" font-size="16" font-family="Georgia, serif" letter-spacing="6" font-weight="bold">⚔️ GREAT WORKS ⚔️</text>

  <!-- Sword decoration right -->
  <line x1="500" y1="30" x2="700" y2="30" stroke="url(#phg)" stroke-width="0.8" opacity="0.5"/>
  <polygon points="705,30 695,26 695,34" fill="#f59e0b" opacity="0.4"/>

  <!-- Sparkle -->
  <circle cx="400" cy="50" r="2" fill="#f59e0b" opacity="0.3" filter="url(#pg)">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
