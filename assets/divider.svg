<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 30" width="100%">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7AA2F7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#7AA2F7;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#BB9AF7;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#7DCFFF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7DCFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="sg">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="100" y1="15" x2="700" y2="15" stroke="url(#lineGrad)" stroke-width="0.5"/>
  <circle cx="400" cy="15" r="3" fill="#BB9AF7" opacity="0.6" filter="url(#sg)">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="15" r="1.5" fill="#7AA2F7" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="15" r="1.5" fill="#7DCFFF" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Rune symbols -->
  <text x="320" y="19" fill="#7AA2F7" font-size="8" font-family="serif" opacity="0.3">ᚦ</text>
  <text x="470" y="19" fill="#7DCFFF" font-size="8" font-family="serif" opacity="0.3">ᛗ</text>
</svg>
