<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" width="100%">
  <defs>
    <linearGradient id="elvishLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8ba4c7;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#6b88aa;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#b8cce4;stop-opacity:0.6"/>
      <stop offset="80%" style="stop-color:#6b88aa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8ba4c7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9952c;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#c9a84c;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#c9952c;stop-opacity:0"/>
    </linearGradient>
    <filter id="divGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main silver line -->
  <line x1="80" y1="25" x2="720" y2="25" stroke="url(#elvishLine)" stroke-width="0.8"/>
  <!-- Gold underline -->
  <line x1="150" y1="28" x2="650" y2="28" stroke="url(#goldLine)" stroke-width="0.3"/>

  <!-- Central Silmaril gem -->
  <g transform="translate(400, 25)" filter="url(#divGlow)">
    <!-- Diamond shape -->
    <polygon points="0,-8 6,0 0,8 -6,0" fill="none" stroke="#b8cce4" stroke-width="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <circle r="2.5" fill="#d4e4f7" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;3;2" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tengwar-like ornaments -->
  <text x="320" y="29" fill="#6b88aa" font-size="9" font-family="serif" opacity="0.25">ᚦ · ᚨ · ᚱ</text>
  <text x="440" y="29" fill="#6b88aa" font-size="9" font-family="serif" opacity="0.25">ᛗ · ᚠ · ᛟ</text>

  <!-- Leaf ornaments -->
  <g transform="translate(280, 25)" opacity="0.2">
    <ellipse rx="6" ry="2.5" fill="none" stroke="#c9a84c" stroke-width="0.5" transform="rotate(-30)"/>
  </g>
  <g transform="translate(520, 25)" opacity="0.2">
    <ellipse rx="6" ry="2.5" fill="none" stroke="#c9a84c" stroke-width="0.5" transform="rotate(30)"/>
  </g>

  <!-- End dots -->
  <circle cx="80" cy="25" r="1.5" fill="#6b88aa" opacity="0.2"/>
  <circle cx="720" cy="25" r="1.5" fill="#6b88aa" opacity="0.2"/>
</svg>
