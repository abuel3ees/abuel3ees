<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="ag">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7AA2F7;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#7AA2F7;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#BB9AF7;stop-opacity:0.8"/>
      <stop offset="75%" style="stop-color:#7DCFFF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7DCFFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="fillWave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7AA2F7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7AA2F7;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#abg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="50" y1="40" x2="750" y2="40"/>
    <line x1="50" y1="80" x2="750" y2="80"/>
    <line x1="50" y1="120" x2="750" y2="120"/>
    <line x1="50" y1="160" x2="750" y2="160"/>
  </g>

  <!-- Activity wave 1 -->
  <path d="M50,130 C100,120 130,60 180,80 C230,100 250,140 300,110 C350,80 370,50 420,70 C470,90 490,130 540,100 C590,70 610,40 660,60 C710,80 730,110 750,90" fill="none" stroke="url(#waveGrad)" stroke-width="2" filter="url(#ag)">
    <animate attributeName="d" values="M50,130 C100,120 130,60 180,80 C230,100 250,140 300,110 C350,80 370,50 420,70 C470,90 490,130 540,100 C590,70 610,40 660,60 C710,80 730,110 750,90;M50,120 C100,100 130,80 180,60 C230,80 250,120 300,100 C350,60 370,70 420,90 C470,110 490,80 540,60 C590,90 610,60 660,80 C710,100 730,90 750,70;M50,130 C100,120 130,60 180,80 C230,100 250,140 300,110 C350,80 370,50 420,70 C470,90 490,130 540,100 C590,70 610,40 660,60 C710,80 730,110 750,90" dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Activity wave fill -->
  <path d="M50,130 C100,120 130,60 180,80 C230,100 250,140 300,110 C350,80 370,50 420,70 C470,90 490,130 540,100 C590,70 610,40 660,60 C710,80 730,110 750,90 L750,180 L50,180 Z" fill="url(#fillWave)">
    <animate attributeName="d" values="M50,130 C100,120 130,60 180,80 C230,100 250,140 300,110 C350,80 370,50 420,70 C470,90 490,130 540,100 C590,70 610,40 660,60 C710,80 730,110 750,90 L750,180 L50,180 Z;M50,120 C100,100 130,80 180,60 C230,80 250,120 300,100 C350,60 370,70 420,90 C470,110 490,80 540,60 C590,90 610,60 660,80 C710,100 730,90 750,70 L750,180 L50,180 Z;M50,130 C100,120 130,60 180,80 C230,100 250,140 300,110 C350,80 370,50 420,70 C470,90 490,130 540,100 C590,70 610,40 660,60 C710,80 730,110 750,90 L750,180 L50,180 Z" dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Moving dot on the wave -->
  <circle r="4" fill="#BB9AF7" filter="url(#ag)">
    <animateMotion dur="8s" repeatCount="indefinite" path="M50,130 C100,120 130,60 180,80 C230,100 250,140 300,110 C350,80 370,50 420,70 C470,90 490,130 540,100 C590,70 610,40 660,60 C710,80 730,110 750,90"/>
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Labels -->
  <text x="400" y="25" text-anchor="middle" fill="#565f89" font-size="10" font-family="monospace" letter-spacing="3">QUEST ACTIVITY</text>
  <text x="30" y="45" fill="#565f89" font-size="7" font-family="monospace" opacity="0.5">MAX</text>
  <text x="30" y="165" fill="#565f89" font-size="7" font-family="monospace" opacity="0.5">MIN</text>

  <!-- Commit dots -->
  <g opacity="0.5">
    <circle cx="180" cy="80" r="3" fill="#7AA2F7" opacity="0.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="110" r="3" fill="#BB9AF7" opacity="0.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="70" r="3" fill="#7DCFFF" opacity="0.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="100" r="3" fill="#7AA2F7" opacity="0.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="60" r="3" fill="#f59e0b" opacity="0.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.3s" repeatCount="indefinite"/></circle>
  </g>
</svg>
