<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="100%">
  <defs>
    <!-- Deep ancient stone background -->
    <linearGradient id="stoneBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="50%" style="stop-color:#12151c"/>
      <stop offset="100%" style="stop-color:#0a0c10"/>
    </linearGradient>

    <!-- Mithril silver glow -->
    <linearGradient id="mithrilGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8ba4c7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#b8cce4;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#d4e4f7;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#b8cce4;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#8ba4c7;stop-opacity:0"/>
    </linearGradient>

    <!-- Elvish moon-silver -->
    <linearGradient id="moonSilver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8ddf5;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6b88aa;stop-opacity:0.3"/>
    </linearGradient>

    <!-- One Ring gold -->
    <linearGradient id="ringGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9952c"/>
      <stop offset="50%" style="stop-color:#f5d058"/>
      <stop offset="100%" style="stop-color:#c9952c"/>
    </linearGradient>

    <!-- Fire of Mount Doom -->
    <linearGradient id="doomFire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b2500;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#c44100;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff6a00;stop-opacity:0"/>
    </linearGradient>

    <!-- Radial glow for staff light -->
    <radialGradient id="staffLight" cx="50%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#d4e4f7;stop-opacity:0.12"/>
      <stop offset="60%" style="stop-color:#8ba4c7;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#8ba4c7;stop-opacity:0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="elvishGlow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="stoneTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Crack pattern for stone walls -->
    <pattern id="stoneCracks" patternUnits="userSpaceOnUse" width="200" height="200">
      <line x1="30" y1="0" x2="45" y2="60" stroke="#1a1d25" stroke-width="0.3" opacity="0.4"/>
      <line x1="120" y1="20" x2="105" y2="90" stroke="#1a1d25" stroke-width="0.2" opacity="0.3"/>
      <line x1="170" y1="50" x2="185" y2="130" stroke="#1a1d25" stroke-width="0.3" opacity="0.35"/>
      <line x1="60" y1="100" x2="80" y2="170" stroke="#1a1d25" stroke-width="0.2" opacity="0.25"/>
      <line x1="140" y1="130" x2="125" y2="200" stroke="#1a1d25" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="500" fill="url(#stoneBg)"/>
  <rect width="1200" height="500" fill="url(#stoneCracks)" opacity="0.3"/>

  <!-- Subtle ambient glow from above (Gandalf's staff) -->
  <rect width="1200" height="500" fill="url(#staffLight)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Distant fire glow from below (Balrog / Mount Doom) -->
  <rect x="0" y="300" width="1200" height="200" fill="url(#doomFire)" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- === STARS OF EÄRENDIL === -->
  <g>
    <!-- Main star - Eärendil, the brightest -->
    <g transform="translate(600, 35)" filter="url(#deepGlow)">
      <circle r="3" fill="#d4e4f7">
        <animate attributeName="r" values="2;4;2" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/>
      </circle>
      <!-- 8-point star rays -->
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#d4e4f7" stroke-width="0.5" opacity="0.4"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#d4e4f7" stroke-width="0.5" opacity="0.4"/>
      <line x1="-7" y1="-7" x2="7" y2="7" stroke="#d4e4f7" stroke-width="0.3" opacity="0.3"/>
      <line x1="7" y1="-7" x2="-7" y2="7" stroke="#d4e4f7" stroke-width="0.3" opacity="0.3"/>
    </g>
    <!-- Lesser stars -->
    <circle cx="120" cy="25" r="1" fill="#8ba4c7" opacity="0.5"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="50" r="0.8" fill="#8ba4c7" opacity="0.4"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="30" r="0.6" fill="#8ba4c7" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="55" r="0.7" fill="#8ba4c7" opacity="0.4"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="45" r="0.9" fill="#8ba4c7" opacity="0.5"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="28" r="0.6" fill="#8ba4c7" opacity="0.3"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="40" r="0.8" fill="#8ba4c7" opacity="0.4"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="50" r="0.7" fill="#8ba4c7" opacity="0.3"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="170" cy="70" r="0.5" fill="#6b88aa" opacity="0.3"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="20" r="0.6" fill="#6b88aa" opacity="0.2"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="60" r="0.5" fill="#6b88aa" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="30" r="0.7" fill="#6b88aa" opacity="0.25"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="5.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- === THE DOOR OF DURIN — Archway === -->
  <g transform="translate(600, 250)">
    <!-- Outer arch -->
    <path d="M-220,180 L-220,-80 C-220,-200 220,-200 220,-80 L220,180" 
          fill="none" stroke="#3a4560" stroke-width="3" opacity="0.3"/>
    <!-- Inner arch (Ithildin - moonlight silver) -->
    <path d="M-200,180 L-200,-70 C-200,-180 200,-180 200,-70 L200,180" 
          fill="none" stroke="#8ba4c7" stroke-width="1.5" opacity="0.5" filter="url(#elvishGlow)">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="7s" repeatCount="indefinite"/>
    </path>

    <!-- Decorative columns (left) -->
    <rect x="-230" y="-80" width="15" height="260" fill="none" stroke="#3a4560" stroke-width="0.8" opacity="0.25" rx="2"/>
    <line x1="-222" y1="-60" x2="-222" y2="170" stroke="#4a5a7a" stroke-width="0.3" opacity="0.2" stroke-dasharray="2,8"/>

    <!-- Decorative columns (right) -->
    <rect x="215" y="-80" width="15" height="260" fill="none" stroke="#3a4560" stroke-width="0.8" opacity="0.25" rx="2"/>
    <line x1="222" y1="-60" x2="222" y2="170" stroke="#4a5a7a" stroke-width="0.3" opacity="0.2" stroke-dasharray="2,8"/>

    <!-- Two Trees of Valinor (simplified, on the door) -->
    <!-- Left tree — Telperion (Silver) -->
    <g transform="translate(-120, -20)" opacity="0.35" filter="url(#elvishGlow)">
      <line x1="0" y1="80" x2="0" y2="20" stroke="#8ba4c7" stroke-width="1.2"/>
      <line x1="0" y1="40" x2="-20" y2="10" stroke="#8ba4c7" stroke-width="0.8"/>
      <line x1="0" y1="40" x2="15" y2="5" stroke="#8ba4c7" stroke-width="0.8"/>
      <line x1="0" y1="55" x2="-25" y2="35" stroke="#8ba4c7" stroke-width="0.6"/>
      <line x1="0" y1="55" x2="20" y2="30" stroke="#8ba4c7" stroke-width="0.6"/>
      <circle cx="-20" cy="8" r="4" fill="none" stroke="#b8cce4" stroke-width="0.5" opacity="0.5"/>
      <circle cx="15" cy="3" r="3" fill="none" stroke="#b8cce4" stroke-width="0.5" opacity="0.5"/>
      <circle cx="0" cy="18" r="3.5" fill="none" stroke="#b8cce4" stroke-width="0.5" opacity="0.4"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="6s" repeatCount="indefinite"/>
    </g>
    <!-- Right tree — Laurelin (Gold) -->
    <g transform="translate(120, -20)" opacity="0.3" filter="url(#elvishGlow)">
      <line x1="0" y1="80" x2="0" y2="20" stroke="#c9952c" stroke-width="1.2"/>
      <line x1="0" y1="40" x2="20" y2="10" stroke="#c9952c" stroke-width="0.8"/>
      <line x1="0" y1="40" x2="-15" y2="5" stroke="#c9952c" stroke-width="0.8"/>
      <line x1="0" y1="55" x2="25" y2="35" stroke="#c9952c" stroke-width="0.6"/>
      <line x1="0" y1="55" x2="-20" y2="30" stroke="#c9952c" stroke-width="0.6"/>
      <circle cx="20" cy="8" r="4" fill="none" stroke="#f5d058" stroke-width="0.5" opacity="0.5"/>
      <circle cx="-15" cy="3" r="3" fill="none" stroke="#f5d058" stroke-width="0.5" opacity="0.5"/>
      <circle cx="0" cy="18" r="3.5" fill="none" stroke="#f5d058" stroke-width="0.5" opacity="0.4"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="7s" repeatCount="indefinite"/>
    </g>

    <!-- Crown / Star at apex of arch -->
    <g transform="translate(0, -185)" filter="url(#elvishGlow)">
      <!-- Seven-pointed star (Elendil's star) -->
      <polygon points="0,-18 3,-6 15,-8 6,1 9,14 0,7 -9,14 -6,1 -15,-8 -3,-6" fill="none" stroke="#b8cce4" stroke-width="0.8" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
      </polygon>
      <circle r="3" fill="#d4e4f7" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Elvish Tengwar inscription along the arch -->
    <g filter="url(#softGlow)">
      <!-- These represent Tengwar-like flowing script along the arch path -->
      <text font-family="serif" font-size="11" fill="#8ba4c7" opacity="0.4" letter-spacing="3">
        <textPath href="#archPath" startOffset="5%">
          ᚦ · ᚨ · ᚱ · ᛗ · ᚠ · ᛟ · ᚦ · ᚨ · ᚱ · ᛗ · ᚠ · ᛟ · ᚦ · ᚨ · ᚱ · ᛗ · ᚠ · ᛟ · ᚦ
        </textPath>
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="8s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Arch path for text -->
  <path id="archPath" d="M380,430 L380,170 C380,70 820,70 820,170 L820,430" fill="none" stroke="none"/>

  <!-- === MAIN TITLE === -->
  <text x="600" y="200" text-anchor="middle" fill="url(#mithrilGrad)" font-size="52" font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif" font-weight="bold" letter-spacing="4" filter="url(#elvishGlow)">
    abuel3ees
  </text>

  <!-- Subtitle in "elvish" style -->
  <text x="600" y="235" text-anchor="middle" fill="#6b88aa" font-size="14" font-family="'Palatino Linotype', Palatino, Georgia, serif" letter-spacing="8" font-variant="small-caps">
    mithrandir of the machine
  </text>

  <!-- The One Ring inscription (animated opacity) -->
  <g transform="translate(600, 290)">
    <text x="0" y="0" text-anchor="middle" fill="#c9952c" font-size="10" font-family="'Palatino Linotype', Palatino, serif" font-style="italic" letter-spacing="2" opacity="0.35">
      ✦  speak, friend, and enter  ✦
      <animate attributeName="opacity" values="0.2;0.45;0.2" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- === THE ONE RING === (animated, floating below title) -->
  <g transform="translate(600, 340)">
    <!-- Ring body -->
    <ellipse rx="45" ry="14" fill="none" stroke="url(#ringGold)" stroke-width="2" opacity="0.3" filter="url(#elvishGlow)">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="13;15;13" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring inscription shimmer -->
    <ellipse rx="42" ry="11" fill="none" stroke="#f5d058" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,6">
      <animate attributeName="stroke-dashoffset" from="0" to="18" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="7s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- === BOTTOM INSCRIPTION BAR === -->
  <rect x="0" y="440" width="1200" height="60" fill="#0a0c10" opacity="0.7"/>
  <line x1="100" y1="445" x2="1100" y2="445" stroke="#3a4560" stroke-width="0.3" opacity="0.3"/>

  <!-- Role badges in elvish style -->
  <g fill="#6b88aa" font-size="11" font-family="'Palatino Linotype', Palatino, Georgia, serif" letter-spacing="2" font-variant="small-caps">
    <text x="200" y="475" text-anchor="middle" opacity="0.5">⚔ full-stack</text>
    <text x="400" y="475" text-anchor="middle" opacity="0.5">🔮 hardware</text>
    <text x="600" y="475" text-anchor="middle" opacity="0.5">📜 risc-v</text>
    <text x="800" y="475" text-anchor="middle" opacity="0.5">🌋 gpu sorcery</text>
    <text x="1000" y="475" text-anchor="middle" opacity="0.5">🧙 open source</text>
  </g>

  <!-- Decorative corner runes -->
  <text x="30" y="30" fill="#3a4560" font-size="20" font-family="serif" opacity="0.2">ᚦ</text>
  <text x="1170" y="30" fill="#3a4560" font-size="20" font-family="serif" opacity="0.2" text-anchor="end">ᛟ</text>
  <text x="30" y="490" fill="#3a4560" font-size="20" font-family="serif" opacity="0.2">ᚨ</text>
  <text x="1170" y="490" fill="#3a4560" font-size="20" font-family="serif" opacity="0.2" text-anchor="end">ᛗ</text>
</svg>
