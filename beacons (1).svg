<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%">
  <defs>
    <linearGradient id="bBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#12151c"/>
    </linearGradient>
    <filter id="bFire">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bSoft">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="140" fill="url(#bBg)"/>

  <!-- Mountain range silhouette -->
  <polygon points="0,100 40,70 80,85 130,55 180,75 230,50 280,70 330,45 380,65 430,40 480,60 530,45 580,55 630,50 680,60 730,45 780,65 800,55 800,120 0,120" fill="#151822" opacity="0.5"/>

  <!-- === SEVEN BEACONS === -->
  <!-- Each beacon lights up with staggered animation -->

  <!-- Beacon 1: Amon Dîn -->
  <g transform="translate(130, 52)">
    <rect x="-3" y="0" width="6" height="15" fill="#2a2520" opacity="0.5"/>
    <circle cy="-5" r="6" fill="#ff6a00" opacity="0" filter="url(#bFire)">
      <animate attributeName="opacity" values="0;0;0.5;0.5" dur="8s" repeatCount="indefinite" keyTimes="0;0.05;0.12;1"/>
    </circle>
    <circle cy="-5" r="3" fill="#ffaa00" opacity="0" filter="url(#bSoft)">
      <animate attributeName="opacity" values="0;0;0.6;0.6" dur="8s" repeatCount="indefinite" keyTimes="0;0.05;0.12;1"/>
      <animate attributeName="r" values="2;4;2;4;2" dur="1.5s" repeatCount="indefinite" begin="0.96s"/>
    </circle>
  </g>

  <!-- Beacon 2: Eilenach -->
  <g transform="translate(230, 47)">
    <rect x="-3" y="0" width="6" height="15" fill="#2a2520" opacity="0.5"/>
    <circle cy="-5" r="6" fill="#ff6a00" opacity="0" filter="url(#bFire)">
      <animate attributeName="opacity" values="0;0;0.5;0.5" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.22;1"/>
    </circle>
    <circle cy="-5" r="3" fill="#ffaa00" opacity="0" filter="url(#bSoft)">
      <animate attributeName="opacity" values="0;0;0.6;0.6" dur="8s" repeatCount="indefinite" keyTimes="0;0.15;0.22;1"/>
      <animate attributeName="r" values="2;4;2;4;2" dur="1.3s" repeatCount="indefinite" begin="1.76s"/>
    </circle>
  </g>

  <!-- Beacon 3: Nardol -->
  <g transform="translate(330, 42)">
    <rect x="-3" y="0" width="6" height="15" fill="#2a2520" opacity="0.5"/>
    <circle cy="-5" r="6" fill="#ff6a00" opacity="0" filter="url(#bFire)">
      <animate attributeName="opacity" values="0;0;0.5;0.5" dur="8s" repeatCount="indefinite" keyTimes="0;0.25;0.32;1"/>
    </circle>
    <circle cy="-5" r="3" fill="#ffaa00" opacity="0" filter="url(#bSoft)">
      <animate attributeName="opacity" values="0;0;0.6;0.6" dur="8s" repeatCount="indefinite" keyTimes="0;0.25;0.32;1"/>
      <animate attributeName="r" values="2;4;2;4;2" dur="1.4s" repeatCount="indefinite" begin="2.56s"/>
    </circle>
  </g>

  <!-- Beacon 4: Erelas -->
  <g transform="translate(400, 38)">
    <rect x="-3" y="0" width="6" height="15" fill="#2a2520" opacity="0.5"/>
    <circle cy="-5" r="7" fill="#ff6a00" opacity="0" filter="url(#bFire)">
      <animate attributeName="opacity" values="0;0;0.5;0.5" dur="8s" repeatCount="indefinite" keyTimes="0;0.35;0.42;1"/>
    </circle>
    <circle cy="-5" r="3.5" fill="#ffaa00" opacity="0" filter="url(#bSoft)">
      <animate attributeName="opacity" values="0;0;0.7;0.7" dur="8s" repeatCount="indefinite" keyTimes="0;0.35;0.42;1"/>
      <animate attributeName="r" values="2;5;2;5;2" dur="1.2s" repeatCount="indefinite" begin="3.36s"/>
    </circle>
  </g>

  <!-- Beacon 5: Min-Rimmon -->
  <g transform="translate(480, 42)">
    <rect x="-3" y="0" width="6" height="15" fill="#2a2520" opacity="0.5"/>
    <circle cy="-5" r="6" fill="#ff6a00" opacity="0" filter="url(#bFire)">
      <animate attributeName="opacity" values="0;0;0.5;0.5" dur="8s" repeatCount="indefinite" keyTimes="0;0.45;0.52;1"/>
    </circle>
    <circle cy="-5" r="3" fill="#ffaa00" opacity="0" filter="url(#bSoft)">
      <animate attributeName="opacity" values="0;0;0.6;0.6" dur="8s" repeatCount="indefinite" keyTimes="0;0.45;0.52;1"/>
      <animate attributeName="r" values="2;4;2;4;2" dur="1.3s" repeatCount="indefinite" begin="4.16s"/>
    </circle>
  </g>

  <!-- Beacon 6: Calenhad -->
  <g transform="translate(580, 45)">
    <rect x="-3" y="0" width="6" height="15" fill="#2a2520" opacity="0.5"/>
    <circle cy="-5" r="6" fill="#ff6a00" opacity="0" filter="url(#bFire)">
      <animate attributeName="opacity" values="0;0;0.5;0.5" dur="8s" repeatCount="indefinite" keyTimes="0;0.55;0.62;1"/>
    </circle>
    <circle cy="-5" r="3" fill="#ffaa00" opacity="0" filter="url(#bSoft)">
      <animate attributeName="opacity" values="0;0;0.6;0.6" dur="8s" repeatCount="indefinite" keyTimes="0;0.55;0.62;1"/>
      <animate attributeName="r" values="2;4;2;4;2" dur="1.5s" repeatCount="indefinite" begin="4.96s"/>
    </circle>
  </g>

  <!-- Beacon 7: Halifirien (the last, reaching Rohan) -->
  <g transform="translate(680, 47)">
    <rect x="-3" y="0" width="6" height="15" fill="#2a2520" opacity="0.5"/>
    <circle cy="-5" r="7" fill="#ff6a00" opacity="0" filter="url(#bFire)">
      <animate attributeName="opacity" values="0;0;0.6;0.6" dur="8s" repeatCount="indefinite" keyTimes="0;0.65;0.72;1"/>
    </circle>
    <circle cy="-5" r="3.5" fill="#ffaa00" opacity="0" filter="url(#bSoft)">
      <animate attributeName="opacity" values="0;0;0.7;0.7" dur="8s" repeatCount="indefinite" keyTimes="0;0.65;0.72;1"/>
      <animate attributeName="r" values="2;5;2;5;2" dur="1.1s" repeatCount="indefinite" begin="5.76s"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="400" y="130" text-anchor="middle" fill="#8b7340" font-size="11" font-family="'Palatino Linotype', Palatino, Georgia, serif" letter-spacing="5" font-variant="small-caps" opacity="0.5">
    The Beacons Are Lit — Gondor Calls For Aid
  </text>
</svg>
