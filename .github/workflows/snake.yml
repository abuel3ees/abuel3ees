name: Generate snake contribution photos

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Update snake photos in assets
        run: |
          cp dist/github-snake.svg assets/github-snake.svg
          cp dist/github-snake-dark.svg assets/github-snake-dark.svg

          if git diff --quiet -- assets/github-snake.svg assets/github-snake-dark.svg; then
            echo "No snake photo updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake.svg assets/github-snake-dark.svg
          git commit -m "chore: update snake contribution photos"
          git push
